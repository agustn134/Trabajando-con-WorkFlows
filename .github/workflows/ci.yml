name: CI/CD Pipeline U2ACT03

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  integracion:
    name: Control de Calidad y Pruebas
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' 
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Mensaje de consola en Push
        run: echo "Iniciando validación para el commit de ${{ github.event.head_commit.author.name }}"

      - name: Ejecutar ESLint
        run: npm run lint

      # Agrega este paso asumiendo que tienes un script "test" en tu package.json
      - name: Ejecutar Pruebas Unitarias
        run: npm run test

  deploy-frontend:
    name: Deploy to Vercel (Production)
    needs: integracion # Bloquea el despliegue si la integración falla
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment info
        run: vercel pull --yes --environment=production --token ${{ secrets.VERCEL_TOKEN }}

      - name: Build for Vercel
        run: vercel build --prod --token ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  deploy-backend:
    name: Deploy to Railway
    needs: integracion
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Instalar Railway CLI
        run: npm i -g @railway/cli

      - name: Desplegar a Railway
        run: railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
