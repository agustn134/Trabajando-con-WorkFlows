name: Desafio 02 - Datos de Pull Request

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

jobs:
  DesplegarDatosPR:
    runs-on: ubuntu-latest

    steps:
      - name: Imprimir información del PR
        run: |
          echo "Datos destino: ${{ github.event.pull_request.base.ref }}"
          echo "Datos origen: ${{ github.event.pull_request.head.ref }}"
          echo "Título del PR: ${{ github.event.pull_request.title }}"
          echo "Descripción: ${{ github.event.pull_request.body }}"
          echo "Estado: ${{ github.event.pull_request.state }}"
          echo "ya Mergeado?: ${{ github.event.pull_request.merged }}"
          echo "My ID 122100504"
